<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sorry Malkin ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: "Poppins", sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#FFF5F7,#FFEFF5,#FFF9F3);
    overflow:hidden;
}

.card{
    width:420px;
    max-width:90%;
    background:rgba(255,255,255,.65);
    backdrop-filter:blur(15px);
    border-radius:30px;
    padding:40px 30px;
    text-align:center;
    box-shadow:0 20px 60px rgba(0,0,0,.08);
}

.gif{
    width:220px;
    border-radius:20px;
}

h1{
    margin-top:20px;
    color:#ff6b8a;
    font-size:34px;
}

p{
    margin-top:15px;
    color:#666;
    line-height:1.8;
    font-size:17px;
}

.buttons{
    position:relative;
    margin-top:40px;
    height:70px;
}

button{
    border:none;
    cursor:pointer;
    padding:14px 35px;
    border-radius:999px;
    font-size:17px;
    font-weight:600;
    transition:.35s;
}

#yes{
    background:#ff7aa2;
    color:white;
}

#yes:hover{
    transform:scale(1.06);
}

#no{
    position:absolute;
    left:230px;
    top:0;
    background:#ffffff;
    color:#ff6b8a;
    border:2px solid #ffd6e2;
}

#popup{
    position:fixed;
    inset:0;
    display:none;
    justify-content:center;
    align-items:center;
    background:rgba(255,255,255,.9);
    z-index:99;
}

.popup-box{
    text-align:center;
}

.popup-box h2{
    font-size:42px;
    color:#ff6b8a;
}

.popup-box p{
    font-size:20px;
}

#continue{
    margin-top:25px;
    background:#ff7aa2;
    color:white;
}
</style>
</head>

<body>

<div class="card">

    <!-- Replace with your gif -->
    <img class="gif"
    src="https://media.tenor.com/6zV8J2JQmJ4AAAAi/peach-goma.gif">

    <h1>I'm Sorry... 🥺</h1>

    <p>
        bacha me sach me aapke liye kr rha tha
        <br>
        Please mujhe maaf kar do.
        <br><br>
        Pinky Promise...
      aage se ese kabhi koi gift ke liye nhi kilsa hunga bata dunga yrr please is baar maaf krde merko 🥺🥺    </p>

    <div class="buttons">

        <button id="yes">
           jaa Maaf Kiya gulam
        </button>

        <button id="no">
            Nhi Kiya kutte
        </button>

    </div>

</div>

<div id="popup">

    <div class="popup-box">

        <h2>Thank You ❤️</h2>

        <p>
            Love you so much bacha. 🥹<br>
            Thankkk youu sooo soo muchh muwahhh 🫂
        </p>

        <button id="continue">
            Continue →
        </button>

    </div>

</div>

<script>

const no=document.getElementById("no");

function moveButton(){

    const x=Math.random()*(window.innerWidth-150);
    const y=Math.random()*(window.innerHeight-80);

    no.style.position="fixed";
    no.style.left=x+"px";
    no.style.top=y+"px";
}

no.addEventListener("mouseenter",moveButton);
no.addEventListener("touchstart",moveButton);

document.getElementById("yes").onclick=()=>{

    document.getElementById("popup").style.display="flex";

}

document.getElementById("continue").onclick=()=>{

    // Replace with your main website
    window.location.href="main.html";

}

</script>

</body>
</html>
